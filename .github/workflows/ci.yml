name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: python -m pytest

      - name: Smoke-check wrappers
        run: python -m py_compile __init__.py cli.py src/hermes_muninndb_plugin/__init__.py src/hermes_muninndb_plugin/cli.py

      - name: Build package
        run: python -m build

      - name: Smoke-test installed wheel materializer
        run: |
          tmpdir=$(mktemp -d)
          python -m venv "$tmpdir/venv"
          "$tmpdir/venv/bin/python" -m pip install --upgrade pip
          wheel=$(ls dist/*.whl | head -n 1)
          "$tmpdir/venv/bin/pip" install "$wheel"
          HERMES_HOME="$tmpdir/hermes-home" "$tmpdir/venv/bin/hermes-muninndb-install" --no-activate --json > "$tmpdir/result.json"
          python - <<'PY' "$tmpdir"
          import importlib.util
          import json
          import pathlib
          import sys

          base = pathlib.Path(sys.argv[1])
          result = json.loads((base / 'result.json').read_text())
          plugin_dir = pathlib.Path(result['plugin_dir'])
          assert plugin_dir.joinpath('plugin.yaml').exists()
          assert plugin_dir.joinpath('__init__.py').exists()
          assert plugin_dir.joinpath('cli.py').exists()
          assert plugin_dir.joinpath('src', 'hermes_muninndb_plugin', '__init__.py').exists()

          spec = importlib.util.spec_from_file_location('materialized_plugin', plugin_dir / '__init__.py')
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          assert hasattr(module, 'register')
          PY
          rm -rf "$tmpdir"
